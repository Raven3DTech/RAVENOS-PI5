name: Build KlipperPi Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout KlipperPi
        uses: actions/checkout@v4
        with:
          path: KlipperPi

      - name: Checkout CustomPiOS
        uses: actions/checkout@v4
        with:
          repository: guysoft/CustomPiOS
          path: CustomPiOS

      # GitHub-hosted runners often have a hostname not listed in /etc/hosts; sudo then prints
      # "unable to resolve host …" on every invocation (harmless but noisy in build logs).
      - name: Map VM hostname in /etc/hosts (quiet sudo warnings)
        run: |
          H=$(hostname)
          grep -qF "$H" /etc/hosts || echo "127.0.0.1 $H" | sudo tee -a /etc/hosts

      # Enlarged Pi images are multi‑GB raw files; PiShrink mounts the image and zero‑fills free
      # space before truncate — needs several GB free on / or the shrink step hits ENOSPC / resize2fs errors.
      - name: Free disk space on runner (PiShrink / large .img)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo docker system prune -af 2>/dev/null || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gawk make build-essential util-linux \
            qemu-user-static qemu-system-arm \
            git p7zip-full python3 python3-yaml python3-git \
            curl unzip wget jq

      - name: Cache base Raspberry Pi OS image
        id: cache-base-image
        uses: actions/cache@v4
        with:
          path: base-image-cache
          key: raspios-lite-arm64-bookworm-v1

      - name: Download base Raspberry Pi OS image
        if: steps.cache-base-image.outputs.cache-hit != 'true'
        run: |
          mkdir -p base-image-cache
          wget -q \
            https://downloads.raspberrypi.org/raspios_lite_arm64_latest \
            -O base-image-cache/raspios_lite_arm64_latest.img.xz
          echo "Downloaded: $(ls -lh base-image-cache/)"

      - name: Build image
        run: |
          sudo modprobe loop
          sudo \
            DIST_PATH=$GITHUB_WORKSPACE/KlipperPi/src \
            CUSTOM_PI_OS_PATH=$GITHUB_WORKSPACE/CustomPiOS/src \
            BASE_ZIP_IMG=$GITHUB_WORKSPACE/base-image-cache/raspios_lite_arm64_latest.img.xz \
            bash $GITHUB_WORKSPACE/CustomPiOS/src/build

      # CustomPiOS already unmounts on success; on failure the ERR trap runs unmount_image force.
      # If anything still holds $BASE_MOUNT_PATH (qemu/apt/dpkg), plain umount can fail. Lazy
      # recursive unmount + loop detach keeps the runner clean and avoids "device is busy" noise.
      - name: Release image mounts and loop devices
        if: always()
        run: |
          M="${GITHUB_WORKSPACE}/KlipperPi/src/workspace/mount"
          sync
          if sudo mount 2>/dev/null | grep -qF "${M}"; then
            echo "Lazy-unmounting ${M} ..."
            sudo umount -R -l "${M}" 2>/dev/null || true
          fi
          sudo losetup -D 2>/dev/null || true

      - name: Upload build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          if-no-files-found: warn
          path: |
            build.log
          retention-days: 7

      - name: Find, shrink, and rename output image
        id: rename
        run: |
          WORKSPACE=KlipperPi/src/workspace
          VERSION="${{ github.ref_name }}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "main" ]; then
            VERSION=$(date +'%Y%m%d')
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          IMG=$(find "${WORKSPACE}" -maxdepth 1 \( -name "*.img" -o -name "*.img.xz" \) | head -n1)
          if [ -z "${IMG}" ]; then
            echo "No image found in ${WORKSPACE}" && ls -la "${WORKSPACE}" && exit 1
          fi
          EXT="${IMG##*.img}"
          DEST="${WORKSPACE}/KlipperPi-${VERSION}-arm64.img${EXT}"
          sudo mv "${IMG}" "${DEST}"
          sudo chown $USER:$USER "${DEST}" || true
          
          # If the resulting file is a raw .img, strip empty blocks and compress it!
          if [[ "${DEST}" == *.img ]]; then
            echo "Disk before PiShrink:"
            df -h
            echo "Downloading PiShrink..."
            sudo wget -q https://raw.githubusercontent.com/Drewsif/PiShrink/master/pishrink.sh -O /usr/local/bin/pishrink.sh
            sudo chmod +x /usr/local/bin/pishrink.sh
            # -s skip first-boot auto-expand hook; -n skip GitHub version check (curl in CI)
            echo "Shrinking filesystem (PiShrink)..."
            if ! sudo pishrink.sh -s -n "${DEST}"; then
              echo "PiShrink failed; retrying with filesystem repair (-r)..."
              sudo pishrink.sh -s -n -r "${DEST}"
            fi
            echo "Disk after PiShrink:"
            df -h
            # PiShrink runs as root; workspace dir often stays root-owned — runner cannot create *.xz here.
            sudo chown "$USER:$USER" "${DEST}" "${WORKSPACE}" 2>/dev/null || true
            echo "Compressing heavily with xz..."
            # -T0 uses all available CPU threads for max speed; sudo so output is writable under root-owned paths
            sudo xz -T0 -z -9 "${DEST}"
            sudo chown "$USER:$USER" "${DEST}.xz"
            DEST="${DEST}.xz"
          fi

          echo "IMAGE_PATH=${DEST}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_NAME=$(basename ${DEST})" >> "$GITHUB_OUTPUT"
          ls -lh "${DEST}"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: KlipperPi-${{ steps.rename.outputs.VERSION }}-arm64
          path: ${{ steps.rename.outputs.IMAGE_PATH }}
          retention-days: 30

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          NOTES=$(awk "/^## ${TAG}/,/^## /" KlipperPi/CHANGELOG.md \
                  | grep -v "^## ${TAG}" | grep -v "^## " | sed '/^$/d')
          if [ -z "${NOTES}" ]; then
            NOTES="See CHANGELOG.md for full details."
          fi
          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "${NOTES}"   >> "$GITHUB_OUTPUT"
          echo "EOF"        >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.IMAGE_PATH }}
          name: "KlipperPi ${{ github.ref_name }}"
          body: |
            ## KlipperPi ${{ github.ref_name }}

            ${{ steps.changelog.outputs.NOTES }}

            ### Targets
            - Raspberry Pi 5 (Bookworm 64-bit arm64)
            - Raspberry Pi 4 (Bookworm 64-bit arm64)

            ### Flash Instructions
            1. Download the `.img.xz` file
            2. Open **Raspberry Pi Imager** → Choose OS → Use Custom
            3. Select the file, choose your SD card / NVMe, and write
            4. Boot your Pi, then browse to `http://klipperpi.local`

            ### Default Credentials
            | Service | URL | User | Password |
            |---|---|---|---|
            | SSH | `ssh pi@klipperpi.local` | `pi` | `raspberry` |
            | Mainsail | `http://klipperpi.local` | — | — |
            | Configurator | `http://klipperpi.local:3000` | — | — |

            > ⚠️ Change the default password after first login: `passwd pi`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
