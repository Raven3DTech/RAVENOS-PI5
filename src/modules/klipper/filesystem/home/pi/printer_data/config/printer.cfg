# ============================================================
# KlipperPi — Default printer.cfg
# ============================================================
# This is a placeholder config that allows Klipper to start.
# Use the Configurator (http://klipperpi.local:3000) to
# generate a proper config for your specific printer and board.
# ============================================================

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[display_status]

[pause_resume]

[respond]

# moonraker-timelapse (installed by KlipperPi timelapse module)
[include timelapse.cfg]

# MCU will be populated by the Configurator
# [mcu]
# serial: /dev/serial/by-id/usb-YOUR_BOARD_HERE

# Printer kinematics will be populated by the Configurator
# [printer]
# kinematics: cartesian
# max_velocity: 300
# max_accel: 3000
# max_z_velocity: 5
# max_z_accel: 100
